<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Gamja+Flower&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        <link rel="icon" type="image/png" href="icon.png">
        <title>Cat's Contacts</title>
    </head>
    <body>
        <header>
            <h1>Cat's Contacts</h1>
        </header>
        <main>
            <form id="form">
                <div class="form-inner">
                    <div>
                        <h2>Vibe</h2>
                        <div class="form-options" id="vibe"></div>
                    </div>
                    <div>
                        <h2>Outfit</h2>
                        <div class="form-options" id="outfit"></div>
                    </div>
                </div>
                <div class="prescripted-checkbox">
                    <label for="is-prescripted">Prescripted?</label>
                    <input 
                        type="checkbox"
                        class="is-prescripted"
                        id="is-prescripted"
                        value="is-prescripted">
                </div>
                <button type="submit" class="find-btn" id="find-btn">Find Contacts!</button>
            </form>
            <div class="modal" id="modal">
                <div class="close-modal-wrapper">
                    <button class="close-modal-btn" id="close-modal-btn">x</button>
                </div>
                <div class="gallery" id="gallery">
                    <button class="arrow-btn" id="left-arrow-btn" disabled><i class="fa-solid fa-caret-left"></i></button>
                    <div class="modal-inner">
                        <h2 class="contact-name" id="contact-name"></h2>
                        <div class="contact">
                            <!-- <div id="contact-img"><img src="./images"></div> -->
                            <div class="contact-details" id="contact-details"></div>
                        </div>
                    </div>
                    <button class="arrow-btn" id="right-arrow-btn"><i class="fa-solid fa-caret-right"></i></button>
                </div>
            </div>
        </main>
        <script type="module" src="index.js"></script>
        <script src="https://kit.fontawesome.com/7864393221.js" crossorigin="anonymous"></script>
    </body>
</html>
